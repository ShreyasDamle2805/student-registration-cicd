<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
    <div class="container nav">
        <a class="brand" href="index.html">Student Portal</a>
        <nav><a href="register.html">Register</a></nav>
    </div>
</header>

<main class="form-page container">
    <section class="form-card compact">
        <h1>Student Login</h1>
        <p class="subtext">Use the details entered on the registration page.</p>

        <div id="message"></div>

        <form id="loginForm">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" name="loginEmail" type="email" required>

            <label for="loginPassword">Password</label>
            <input id="loginPassword" name="loginPassword" type="password" required>

            <button class="btn full-width" type="submit">Login</button>
        </form>

        <p class="form-footer">
            New student? <a href="register.html">Create an account</a>
        </p>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
