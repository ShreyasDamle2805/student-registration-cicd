<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Student Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
    <div class="container nav">
        <a class="brand" href="index.html">Student Portal</a>
        <nav><a href="login.html">Login</a></nav>
    </div>
</header>

<main class="form-page container">
    <section class="form-card">
        <h1>Create Student Account</h1>
        <p class="subtext">Fill in your details to preview the registration flow.</p>

        <div id="message"></div>

        <form id="registerForm">
            <label for="fullName">Full Name</label>
            <input id="fullName" name="fullName" type="text" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>

            <label for="usn">USN</label>
            <input id="usn" name="usn" type="text" required>

            <label for="department">Department</label>
            <select id="department" name="department" required>
                <option value="">Select department</option>
                <option>Information Science</option>
                <option>Computer Science</option>
                <option>Artificial Intelligence</option>
                <option>Electronics</option>
                <option>Mechanical</option>
            </select>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="6" required>

            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" required>

            <button class="btn full-width" type="submit">Register</button>
        </form>

        <p class="form-footer">
            Already registered? <a href="login.html">Login here</a>
        </p>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
